<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kaarai Karangal</title>
    <script>
      // Single Page Application (SPA) redirect for GitHub Pages.
      // When GitHub Pages returns a 404 for a direct URL, this script
      // encodes the path and redirects to index.html which then restores it.
      // See: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 0; // 0 for custom domains (root), 1 for project sites (/repo-name)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
